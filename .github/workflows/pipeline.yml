name: Crypto Analytics Pipeline

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ingestion
        env:
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
        run: python ingestion/ingest.py

      - name: dbt run
        working-directory: dbt_project
        run: |
          dbt deps
          dbt run

      - name: dbt test
        working-directory: dbt_project
        run: dbt test

      - name: Commit exports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/exports/*.csv
          git diff --staged --quiet || git commit -m "chore: update gold layer exports [skip ci]"
          git push
